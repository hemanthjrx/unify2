kind = "web"
previewPath = "/"
title = "Unify"
version = "1.0.0"
id = "artifacts/unify"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18662

[services.development]
run = "pnpm --filter @workspace/unify run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/unify", "run", "build" ]
publicDir = "artifacts/unify/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18662"
BASE_PATH = "/"
